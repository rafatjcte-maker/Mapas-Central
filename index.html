<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mapa Colaborativo com Zoom</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #eee; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    
    .toolbar { padding: 10px; background: white; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    /* Área de visualização que permite o zoom */
    #viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #ddd;
      cursor: grab;
    }

    #mapa-container { 
      position: absolute;
      transform-origin: 0 0; /* Zoom a partir do canto superior esquerdo */
      display: inline-block;
      line-height: 0;
    }

    #mapa { display: block; pointer-events: none; }

    canvas { position: absolute; top: 0; left: 0; touch-action: none; z-index: 5; }

    .ponto-wrapper {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
    }
    .check-mark { color: #28a745; font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px black; cursor: pointer; }
    .nota-texto { background: white; padding: 2px 5px; border-radius: 4px; font-size: 11px; display: block; border: 1px solid #ccc; }

    button { padding: 10px; cursor: pointer; margin: 0 5px; border-radius: 4px; border: 1px solid #ccc; }
    .active { background: #007bff; color: white; }
  </style>
</head>
<body>

<div class="toolbar">
  <button id="btn-check" class="active">Check (✓)</button>
  <button id="btn-draw">Desenhar</button>
  <button id="btn-reset">Reset Zoom</button>
  <button id="btn-clear" style="color: red;">Limpar Tudo</button>
</div>

<div id="viewport">
  <div id="mapa-container">
    <img id="mapa" src="sua_imagem.jpeg" alt="Mapa">
    <canvas id="canvas-camada"></canvas>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
    authDomain: "mapas-central-62849.firebaseapp.com",
    databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
    projectId: "mapas-central-62849",
    storageBucket: "mapas-central-62849.firebasestorage.app",
    messagingSenderId: "404730642965",
    appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const viewport = document.getElementById('viewport');
  const container = document.getElementById('mapa-container');
  const mapaImg = document.getElementById('mapa');
  const canvas = document.getElementById('canvas-camada');
  const ctx = canvas.getContext('2d');

  let scale = 1, lastScale = 1;
  let posX = 0, posY = 0;
  let modo = 'check', desenhando = false;
  let startDist = 0; // Para pinça

  function ajustarCanvas() {
    canvas.width = mapaImg.width;
    canvas.height = mapaImg.height;
    aplicarTransform();
    renderizarDesenho();
  }
  mapaImg.onload = ajustarCanvas;

  function aplicarTransform() {
    container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }

  // --- LOGICA DE ZOOM (MOUSE E PINÇA) ---
  viewport.addEventListener('wheel', e => {
    e.preventDefault();
    const zoomSpeed = 0.1;
    const delta = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
    const newScale = Math.min(Math.max(0.5, scale + delta), 5);
    
    // Zoom focado no mouse
    const rect = container.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) / scale;
    const mouseY = (e.clientY - rect.top) / scale;
    
    posX -= mouseX * (newScale - scale);
    posY -= mouseY * (newScale - scale);
    scale = newScale;
    aplicarTransform();
  }, { passive: false });

  viewport.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
      lastScale = scale;
    }
  });

  viewport.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
      scale = Math.min(Math.max(0.5, lastScale * (dist / startDist)), 5);
      aplicarTransform();
    }
  }, { passive: false });

  // --- CLIQUES E DESENHO ---
  canvas.onmousedown = (e) => lidarInicio(e.clientX, e.clientY);
  canvas.onmousemove = (e) => lidarMovimento(e.clientX, e.clientY);
  window.onmouseup = lidarFim;

  function lidarInicio(clientX, clientY) {
    const rect = container.getBoundingClientRect();
    const x = (clientX - rect.left) / scale;
    const y = (clientY - rect.top) / scale;

    if (modo === 'check') {
      const nota = prompt("Anotação:");
      db.ref('pontos').push({ x, y, nota: nota || "" });
    } else if (modo === 'draw') {
      desenhando = true;
      ctx.beginPath();
      ctx.moveTo(x, y);
    }
  }

  function lidarMovimento(clientX, clientY) {
    if (!desenhando || modo !== 'draw') return;
    const rect = container.getBoundingClientRect();
    const x = (clientX - rect.left) / scale;
    const y = (clientY - rect.top) / scale;
    ctx.lineTo(x, y);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3 / scale; // Mantém a linha fina mesmo com zoom
    ctx.stroke();
  }

  function lidarFim() {
    if (desenhando) {
      desenhando = false;
      db.ref('desenho').set(canvas.toDataURL());
    }
  }

  // --- BOTÕES ---
  document.getElementById('btn-check').onclick = () => { modo = 'check'; alternarBotao('btn-check'); };
  document.getElementById('btn-draw').onclick = () => { modo = 'draw'; alternarBotao('btn-draw'); };
  document.getElementById('btn-reset').onclick = () => { scale = 1; posX = 0; posY = 0; aplicarTransform(); };
  document.getElementById('btn-clear').onclick = () => { if(confirm("Apagar tudo?")) db.ref('/').remove(); };

  function alternarBotao(id) {
    document.getElementById('btn-check').classList.remove('active');
    document.getElementById('btn-draw').classList.remove('active');
    document.getElementById(id).classList.add('active');
  }

  // --- FIREBASE ---
  db.ref('pontos').on('child_added', snap => {
    const p = snap.val();
    const div = document.createElement('div');
    div.className = 'ponto-wrapper';
    div.id = snap.key;
    div.style.left = p.x + 'px';
    div.style.top = p.y + 'px';
    div.innerHTML = `<div class="check-mark">✓</div>${p.nota ? `<span class="nota-texto">${p.nota}</span>` : ''}`;
    div.onclick = () => db.ref('pontos/' + snap.key).remove();
    container.appendChild(div);
  });

  db.ref('pontos').on('child_removed', snap => document.getElementById(snap.key)?.remove());

  function renderizarDesenho() {
    db.ref('desenho').on('value', snap => {
      const data = snap.val();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (data) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = data;
      }
    });
  }
</script>

</body>
</html>

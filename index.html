<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Mapa Colaborativo</title>
  <style>
    #mapa-container {
      position: relative;
      width: 800px; /* ajuste se quiser outra largura */
      cursor: crosshair;
    }
    #mapa {
      width: 100%;
      display: block;
    }

    /* Cada ponto será um X vermelho */
    .ponto {
      position: absolute;
      width: 20px;
      height: 20px;
      pointer-events: auto;
      cursor: pointer;
    }
    .ponto::before,
    .ponto::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 2px;
      background-color: red;
      transform-origin: center;
    }
    .ponto::before { transform: translate(-50%, -50%) rotate(45deg); }
    .ponto::after { transform: translate(-50%, -50%) rotate(-45deg); }
  </style>
</head>
<body>

<h2>Mapa Colaborativo</h2>

<div id="mapa-container">
  <img id="mapa" src="sua_imagem.jpeg" alt="Mapa" />
</div>

<!-- Firebase compatível com navegador -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // Configuração do seu Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
    authDomain: "mapas-central-62849.firebaseapp.com",
    databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
    projectId: "mapas-central-62849",
    storageBucket: "mapas-central-62849.firebasestorage.app",
    messagingSenderId: "404730642965",
    appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const mapa = document.getElementById('mapa');
  const container = document.getElementById('mapa-container');
  const pontosDOM = {}; // guarda referência aos Xs

  // Criar ponto X na tela
  function criarPonto(id, x, y) {
    const div = document.createElement('div');
    div.classList.add('ponto');
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.dataset.id = id;

    // Apagar ponto ao clicar
    div.addEventListener('click', function(event) {
      event.stopPropagation();
      db.ref('pontos/' + this.dataset.id).remove();
    });

    container.appendChild(div);
    pontosDOM[id] = div;
  }

  // Adicionar novo ponto ao clicar na imagem
  mapa.onclick = function(e) {
    const x = e.offsetX;
    const y = e.offsetY;
    db.ref('pontos').push({ x, y });
  };

  // Mostrar pontos existentes do Firebase
  db.ref('pontos').on('child_added', snapshot => {
    const id = snapshot.key;
    const ponto = snapshot.val();
    criarPonto(id, ponto.x, ponto.y);
  });

  // Remover ponto quando apagado do Firebase
  db.ref('pontos').on('child_removed', snapshot => {
    const id = snapshot.key;
    const div = pontosDOM[id];
    if (div) {
      div.remove();
      delete pontosDOM[id];
    }
  });
</script>

</body>
</html>

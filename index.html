<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa Colaborativo - Versão Blindada</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* Barra de Ferramentas */
        .toolbar { background: #333; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #444; z-index: 1000; }
        
        /* Área do Mapa */
        #viewport { flex: 1; overflow: auto; position: relative; background: #000; }
        #mapa-container { position: relative; transform-origin: 0 0; display: inline-block; }
        
        #mapa { 
            display: block; 
            pointer-events: none; /* Impede que o navegador tente "pegar" a imagem */
            user-select: none;
            -webkit-user-drag: none;
        }

        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 5; 
            cursor: crosshair; 
            touch-action: none; 
        }

        /* Marcadores */
        .ponto-wrapper {
            position: absolute;
            z-index: 100;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto; /* Garante que o ✓ seja clicável para apagar */
        }
        .check-mark { color: #00ff44; font-size: 30px; font-weight: bold; text-shadow: 2px 2px 4px #000; cursor: pointer; line-height: 1; }
        .nota-label { background: white; color: black; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid #000; margin-top: 2px; display: block; }

        /* Rodapé de Anotação */
        .footer { background: #333; padding: 15px; border-top: 2px solid #444; text-align: center; }
        input[type="text"] { width: 300px; padding: 10px; border-radius: 4px; border: 1px solid #555; }
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; background: #eee; }
        button.active { background: #007bff; color: white; }
        .btn-clear { background: #ff4444; color: white; margin-left: 20px; }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="btn-check" class="active">Modo Check ✓</button>
    <button id="btn-draw">Modo Desenho</button>
    <button id="btn-zoom-in">Zoom +</button>
    <button id="btn-zoom-out">Zoom -</button>
    <button id="btn-clear" class="btn-clear">LIMPAR TUDO</button>
</div>

<div id="viewport">
    <div id="mapa-container">
        <img id="mapa" src="sua_imagem.jpeg">
        <canvas id="canvas-camada"></canvas>
    </div>
</div>

<div class="footer">
    <strong>Anotação:</strong> 
    <input type="text" id="input-nota" placeholder="Escreva aqui e DEPOIS clique no mapa">
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // Configuração Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
        authDomain: "mapas-central-62849.firebaseapp.com",
        databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
        projectId: "mapas-central-62849",
        storageBucket: "mapas-central-62849.firebasestorage.app",
        messagingSenderId: "404730642965",
        appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const container = document.getElementById('mapa-container');
    const mapaImg = document.getElementById('mapa');
    const canvas = document.getElementById('canvas-camada');
    const ctx = canvas.getContext('2d');
    const inputNota = document.getElementById('input-nota');

    let zoom = 1.0;
    let modo = 'check';
    let desenhando = false;

    // Ajusta o Canvas apenas quando a imagem carregar
    mapaImg.onload = () => {
        canvas.width = mapaImg.naturalWidth;
        canvas.height = mapaImg.naturalHeight;
        carregarDesenho();
    };
    if (mapaImg.complete) mapaImg.onload();

    // Zoom
    document.getElementById('btn-zoom-in').onclick = () => { zoom += 0.2; atualizarZoom(); };
    document.getElementById('btn-zoom-out').onclick = () => { if(zoom > 0.2) zoom -= 0.2; atualizarZoom(); };
    function atualizarZoom() { container.style.transform = `scale(${zoom})`; }

    // Modos
    document.getElementById('btn-check').onclick = () => { modo = 'check'; alternarBotao('btn-check'); };
    document.getElementById('btn-draw').onclick = () => { modo = 'draw'; alternarBotao('btn-draw'); };
    function alternarBotao(id) {
        document.getElementById('btn-check').classList.remove('active');
        document.getElementById('btn-draw').classList.remove('active');
        document.getElementById(id).classList.add('active');
    }

    // INTERAÇÃO NO CANVAS
    canvas.onmousedown = (e) => {
        // Coordenadas puras dentro do Canvas
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / zoom;
        const y = (e.clientY - rect.top) / zoom;

        if (modo === 'check') {
            const nota = inputNota.value.trim();
            db.ref('pontos').push({ x, y, nota: nota });
            inputNota.value = ""; // Limpa após colocar
        } else {
            desenhando = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
    };

    canvas.onmousemove = (e) => {
        if (!desenhando || modo !== 'draw') return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / zoom;
        const y = (e.clientY - rect.top) / zoom;
        
        ctx.lineTo(x, y);
        ctx.strokeStyle = "red";
        ctx.lineWidth = 5;
        ctx.lineJoin = "round";
        ctx.stroke();
    };

    window.onmouseup = () => {
        if (desenhando) {
            desenhando = false;
            db.ref('desenho').set(canvas.toDataURL());
        }
    };

    // Firebase: Receber Checks
    db.ref('pontos').on('child_added', snap => {
        const p = snap.val();
        const wrapper = document.createElement('div');
        wrapper.className = 'ponto-wrapper';
        wrapper.id = snap.key;
        wrapper.style.left = p.x + 'px';
        wrapper.style.top = p.y + 'px';
        
        wrapper.innerHTML = `
            <div class="check-mark" onclick="apagarCheck('${snap.key}')">✓</div>
            ${p.nota ? `<div class="nota-label">${p.nota}</div>` : ''}
        `;
        container.appendChild(wrapper);
    });

    db.ref('pontos').on('child_removed', snap => {
        document.getElementById(snap.key)?.remove();
    });

    function apagarCheck(id) {
        db.ref('pontos/' + id).remove();
    }

    // Firebase: Receber Desenho
    function carregarDesenho() {
        db.ref('desenho').on('value', snap => {
            const data = snap.val();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (data) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = data;
            }
        });
    }

    document.getElementById('btn-clear').onclick = () => {
        if(confirm("ATENÇÃO: Isso apaga o mapa inteiro para TODO MUNDO. Continuar?")) {
            db.ref('/').remove();
        }
    };
</script>

</body>
</html>

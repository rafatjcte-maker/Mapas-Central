<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa Colaborativo Simples</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .toolbar { background: #333; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #444; z-index: 1000; }
        
        #viewport { flex: 1; overflow: auto; position: relative; background: #000; touch-action: none; }
        #mapa-container { position: relative; transform-origin: 0 0; display: inline-block; }
        
        #mapa { display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }

        canvas { position: absolute; top: 0; left: 0; z-index: 5; cursor: crosshair; }

        .ponto-wrapper {
            position: absolute;
            z-index: 100;
            transform: translate(-50%, -50%);
            cursor: pointer;
            pointer-events: auto;
        }
        .check-mark { color: #00ff44; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px #000; line-height: 1; }

        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; background: #eee; }
        button.active { background: #007bff; color: white; }
        .btn-clear { background: #ff4444; color: white; margin-left: 20px; }
    </style>
</head>
<body>

<div class="toolbar">
    <button id="btn-check" class="active">Modo Check ✓</button>
    <button id="btn-draw">Modo Desenho</button>
    <button id="btn-zoom-in">Zoom +</button>
    <button id="btn-zoom-out">Zoom -</button>
    <button id="btn-clear" class="btn-clear">LIMPAR TUDO</button>
</div>

<div id="viewport">
    <div id="mapa-container">
        <img id="mapa" src="sua_imagem.jpeg">
        <canvas id="canvas-camada"></canvas>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
        authDomain: "mapas-central-62849.firebaseapp.com",
        databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
        projectId: "mapas-central-62849",
        storageBucket: "mapas-central-62849.firebasestorage.app",
        messagingSenderId: "404730642965",
        appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const container = document.getElementById('mapa-container');
    const mapaImg = document.getElementById('mapa');
    const canvas = document.getElementById('canvas-camada');
    const ctx = canvas.getContext('2d');

    let zoom = 1.0;
    let modo = 'check';
    let desenhando = false;

    mapaImg.onload = () => {
        canvas.width = mapaImg.naturalWidth;
        canvas.height = mapaImg.naturalHeight;
        carregarDesenho();
    };
    if (mapaImg.complete) mapaImg.onload();

    // Zoom
    document.getElementById('btn-zoom-in').onclick = () => { zoom += 0.2; aplicarZoom(); };
    document.getElementById('btn-zoom-out').onclick = () => { if(zoom > 0.2) zoom -= 0.2; aplicarZoom(); };
    function aplicarZoom() { container.style.transform = `scale(${zoom})`; }

    // Modos
    document.getElementById('btn-check').onclick = () => { modo = 'check'; alternar('btn-check'); };
    document.getElementById('btn-draw').onclick = () => { modo = 'draw'; alternar('btn-draw'); };
    function alternar(id) {
        document.getElementById('btn-check').classList.remove('active');
        document.getElementById('btn-draw').classList.remove('active');
        document.getElementById(id).classList.add('active');
    }

    // Ação no Canvas
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / zoom;
        const y = (e.clientY - rect.top) / zoom;

        if (modo === 'check') {
            db.ref('pontos').push({ x, y });
        } else {
            desenhando = true;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }
    };

    canvas.onmousemove = (e) => {
        if (!desenhando || modo !== 'draw') return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / zoom;
        const y = (e.clientY - rect.top) / zoom;
        
        ctx.lineTo(x, y);
        ctx.strokeStyle = "red";
        ctx.lineWidth = 5;
        ctx.lineJoin = "round";
        ctx.stroke();
    };

    window.onmouseup = () => {
        if (desenhando) {
            desenhando = false;
            db.ref('desenho').set(canvas.toDataURL());
        }
    };

    // Firebase: Checks
    db.ref('pontos').on('child_added', snap => {
        const p = snap.val();
        const div = document.createElement('div');
        div.className = 'ponto-wrapper';
        div.id = snap.key;
        div.style.left = p.x + 'px';
        div.style.top = p.y + 'px';
        div.innerHTML = `<div class="check-mark">✓</div>`;
        div.onclick = (e) => { e.stopPropagation(); db.ref('pontos/' + snap.key).remove(); };
        container.appendChild(div);
    });

    db.ref('pontos').on('child_removed', snap => {
        document.getElementById(snap.key)?.remove();
    });

    // Firebase: Desenho
    function carregarDesenho() {
        db.ref('desenho').on('value', snap => {
            const data = snap.val();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (data) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = data;
            }
        });
    }

    document.getElementById('btn-clear').onclick = () => {
        if(confirm("Apagar tudo para todos?")) db.ref('/').remove();
    };
</script>
</body>
</html>

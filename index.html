<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Mapa Colaborativo Simples</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #eee; }
    .toolbar { margin: 10px; padding: 10px; background: white; border-radius: 8px; display: inline-block; }
    
    #mapa-container { 
      position: relative; 
      display: inline-block; /* Ajusta ao tamanho da imagem */
      border: 2px solid #ccc;
    }

    #mapa { display: block; max-width: 800px; height: auto; }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
    }

    .ponto {
      position: absolute;
      color: #28a745;
      font-size: 24px;
      font-weight: bold;
      pointer-events: none; /* Deixa o clique passar para o canvas */
      transform: translate(-50%, -50%);
      text-shadow: 1px 1px 2px black;
    }
    
    button { padding: 10px; cursor: pointer; margin: 0 5px; }
    .active { background: #007bff; color: white; }
  </style>
</head>
<body>

<div class="toolbar">
  <button id="btn-check" class="active">Check (✓)</button>
  <button id="btn-draw">Desenhar</button>
  <button id="btn-erase">Apagar Tudo</button>
</div>

<div id="mapa-container">
  <img id="mapa" src="sua_imagem.jpeg" alt="Mapa">
  <canvas id="canvas-camada"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
    authDomain: "mapas-central-62849.firebaseapp.com",
    databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
    projectId: "mapas-central-62849",
    storageBucket: "mapas-central-62849.firebasestorage.app",
    messagingSenderId: "404730642965",
    appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const container = document.getElementById('mapa-container');
  const mapaImg = document.getElementById('mapa');
  const canvas = document.getElementById('canvas-camada');
  const ctx = canvas.getContext('2d');
  
  let modo = 'check';
  let desenhando = false;

  // Ajusta o canvas exatamente sobre a imagem quando ela carrega
  mapaImg.onload = function() {
    canvas.width = mapaImg.width;
    canvas.height = mapaImg.height;
    carregarDesenho();
  };

  // Se a imagem já estiver no cache
  if (mapaImg.complete) mapaImg.onload();

  // Troca de Modos
  document.getElementById('btn-check').onclick = (e) => { modo = 'check'; atualizarBotoes(e.target); };
  document.getElementById('btn-draw').onclick = (e) => { modo = 'draw'; atualizarBotoes(e.target); };
  document.getElementById('btn-erase').onclick = () => { if(confirm("Limpar mapa?")) db.ref('/').remove(); };

  function atualizarBotoes(btnAtivo) {
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btnAtivo.classList.add('active');
  }

  // Eventos de Clique/Desenho
  canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (modo === 'check') {
      db.ref('pontos').push({ x, y });
    } else {
      desenhando = true;
      ctx.beginPath();
      ctx.moveTo(x, y);
    }
  };

  canvas.onmousemove = (e) => {
    if (!desenhando || modo !== 'draw') return;
    const rect = canvas.getBoundingClientRect();
    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;
    ctx.stroke();
  };

  canvas.onmouseup = () => {
    if (modo === 'draw') {
      desenhando = false;
      db.ref('desenho').set(canvas.toDataURL());
    }
  };

  // Sincronização Firebase
  db.ref('pontos').on('child_added', snap => {
    const p = snap.val();
    const el = document.createElement('div');
    el.className = 'ponto';
    el.id = snap.key;
    el.innerHTML = '✓';
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    // Para apagar um check: segure SHIFT e clique (simples e funcional)
    el.style.pointerEvents = 'auto'; 
    el.onclick = (e) => { db.ref('pontos/' + snap.key).remove(); e.stopPropagation(); };
    container.appendChild(el);
  });

  db.ref('pontos').on('child_removed', snap => {
    document.getElementById(snap.key)?.remove();
  });

  function carregarDesenho() {
    db.ref('desenho').on('value', snap => {
      const data = snap.val();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (data) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = data;
      }
    });
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mapa Interativo - Versão Final Corrigida</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #222; color: white; display: flex; flex-direction: column; align-items: center; }
    
    .toolbar { background: #333; width: 100%; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #444; }
    
    #viewport { 
      width: 95vw; 
      height: 65vh; 
      overflow: auto; 
      background: #111; 
      margin-top: 10px; 
      border: 1px solid #555;
      position: relative;
    }

    #mapa-container { position: relative; transform-origin: 0 0; }
    #mapa { display: block; user-select: none; pointer-events: none; }
    
    canvas { position: absolute; top: 0; left: 0; z-index: 5; cursor: crosshair; touch-action: none; }

    .ponto-wrapper { 
      position: absolute; 
      z-index: 100; /* Garante que fique acima de tudo */
      transform: translate(-50%, -50%); 
      text-align: center; 
      cursor: pointer;
    }
    .check-mark { color: #00ff44; font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px #000; pointer-events: auto; }
    .nota-label { background: rgba(255,255,255,0.9); color: black; padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-top: 2px; font-weight: bold; border: 1px solid black; }

    .footer { background: #333; width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    input[type="text"] { width: 300px; padding: 10px; border-radius: 4px; border: none; font-size: 16px; }
    
    button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; background: #eee; transition: 0.2s; }
    button.active { background: #007bff; color: white; }
    .btn-clear { background: #ff4444; color: white; }
  </style>
</head>
<body>

<div class="toolbar">
  <button id="btn-check" class="active">Modo Check ✓</button>
  <button id="btn-draw">Modo Desenho</button>
  <button id="btn-zoom-in">Zoom +</button>
  <button id="btn-zoom-out">Zoom -</button>
  <button id="btn-clear" class="btn-clear">Limpar Tudo</button>
</div>

<div id="viewport">
  <div id="mapa-container">
    <img id="mapa" src="sua_imagem.jpeg" alt="Aguardando imagem...">
    <canvas id="canvas-camada"></canvas>
  </div>
</div>

<div class="footer">
  <div>
    <strong>Anotação (opcional):</strong>
    <input type="text" id="input-nota" placeholder="Digite aqui ANTES de clicar...">
  </div>
  <p style="font-size: 13px; color: #ccc;">No modo Check, clique no mapa para marcar. Clique no ✓ para apagar.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // Configuração Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
    authDomain: "mapas-central-62849.firebaseapp.com",
    databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
    projectId: "mapas-central-62849",
    storageBucket: "mapas-central-62849.firebasestorage.app",
    messagingSenderId: "404730642965",
    appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const container = document.getElementById('mapa-container');
  const mapaImg = document.getElementById('mapa');
  const canvas = document.getElementById('canvas-camada');
  const ctx = canvas.getContext('2d');
  const inputNota = document.getElementById('input-nota');

  let zoom = 1.0;
  let modo = 'check';
  let desenhando = false;

  // Sincronizar Canvas
  mapaImg.onload = () => {
    canvas.width = mapaImg.naturalWidth;
    canvas.height = mapaImg.naturalHeight;
    carregarDesenho();
  };
  if (mapaImg.complete) mapaImg.onload();

  // Funções de Zoom
  document.getElementById('btn-zoom-in').onclick = () => { zoom += 0.2; aplicarZoom(); };
  document.getElementById('btn-zoom-out').onclick = () => { if(zoom > 0.2) zoom -= 0.2; aplicarZoom(); };
  function aplicarZoom() { container.style.transform = `scale(${zoom})`; }

  // Alternar Modos
  document.getElementById('btn-check').onclick = () => { modo = 'check'; atualizarUI('btn-check'); };
  document.getElementById('btn-draw').onclick = () => { modo = 'draw'; atualizarUI('btn-draw'); };
  function atualizarUI(id) {
    document.getElementById('btn-check').classList.remove('active');
    document.getElementById('btn-draw').classList.remove('active');
    document.getElementById(id).classList.add('active');
  }

  // Interação com Canvas
  canvas.addEventListener('mousedown', (e) => {
    // Pegar coordenadas exatas dentro do canvas independente do zoom
    const x = e.offsetX;
    const y = e.offsetY;

    if (modo === 'check') {
      const texto = inputNota.value.trim();
      db.ref('pontos').push({ x, y, nota: texto });
      inputNota.value = ""; // Limpa após marcar
    } else {
      desenhando = true;
      ctx.beginPath();
      ctx.moveTo(x, y);
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!desenhando || modo !== 'draw') return;
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 5;
    ctx.lineJoin = "round";
    ctx.stroke();
  });

  window.addEventListener('mouseup', () => {
    if (desenhando) {
      desenhando = false;
      db.ref('desenho').set(canvas.toDataURL());
    }
  });

  // Firebase: Marcadores
  db.ref('pontos').on('child_added', snap => {
    const p = snap.val();
    const div = document.createElement('div');
    div.className = 'ponto-wrapper';
    div.id = snap.key;
    div.style.left = p.x + 'px';
    div.style.top = p.y + 'px';
    
    div.innerHTML = `<div class="check-mark">✓</div>${p.nota ? `<div class="nota-label">${p.nota}</div>` : ''}`;
    
    // Apagar ao clicar
    div.onclick = (e) => {
      e.stopPropagation();
      db.ref('pontos/' + snap.key).remove();
    };
    
    container.appendChild(div);
  });

  db.ref('pontos').on('child_removed', snap => {
    document.getElementById(snap.key)?.remove();
  });

  // Firebase: Desenho
  function carregarDesenho() {
    db.ref('desenho').on('value', snap => {
      const data = snap.val();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (data) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = data;
      }
    });
  }

  document.getElementById('btn-clear').onclick = () => {
    if(confirm("Isso apagará TUDO para todos os usuários. Confirmar?")) db.ref('/').remove();
  };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Colaborativo Estável</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; }
    
    .toolbar { position: sticky; top: 0; background: white; width: 100%; padding: 15px; display: flex; justify-content: center; gap: 10px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-wrap: wrap; }
    
    #viewport { width: 95vw; height: 70vh; overflow: auto; border: 2px solid #ccc; background: #ddd; position: relative; margin-top: 10px; }

    #mapa-container { position: relative; transform-origin: 0 0; }
    #mapa { display: block; user-select: none; -webkit-user-drag: none; }
    canvas { position: absolute; top: 0; left: 0; z-index: 5; cursor: crosshair; touch-action: none; }

    .ponto-wrapper { position: absolute; transform: translate(-50%, -50%); z-index: 10; text-align: center; pointer-events: auto; cursor: pointer; }
    .check-mark { color: #28a745; font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
    .nota-label { background: white; padding: 2px 5px; border-radius: 3px; font-size: 11px; border: 1px solid #999; white-space: nowrap; }

    .painel-notas { background: white; width: 95vw; padding: 15px; margin-top: 10px; border-radius: 8px; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }
    input[type="text"] { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    
    button { padding: 10px 15px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: white; font-weight: bold; }
    button.active { background: #007bff; color: white; border-color: #0056b3; }
  </style>
</head>
<body>

<div class="toolbar">
  <button id="btn-check" class="active">Modo Check ✓</button>
  <button id="btn-draw">Modo Desenho</button>
  <button id="btn-zoom-in">Zoom +</button>
  <button id="btn-zoom-out">Zoom -</button>
  <button id="btn-clear" style="color:red">Limpar Tudo</button>
</div>

<div id="viewport">
  <div id="mapa-container">
    <img id="mapa" src="sua_imagem.jpeg">
    <canvas id="canvas-camada"></canvas>
  </div>
</div>

<div class="painel-notas">
  <strong>Anotação Opcional:</strong><br><br>
  <input type="text" id="campo-nota" placeholder="Escreva aqui antes de clicar no mapa...">
  <p style="font-size: 12px; color: #666;">* Escreva o texto acima e clique no mapa para marcar. Clique em um "✓" para apagá-lo.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
    authDomain: "mapas-central-62849.firebaseapp.com",
    databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
    projectId: "mapas-central-62849",
    storageBucket: "mapas-central-62849.firebasestorage.app",
    messagingSenderId: "404730642965",
    appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const container = document.getElementById('mapa-container');
  const mapaImg = document.getElementById('mapa');
  const canvas = document.getElementById('canvas-camada');
  const ctx = canvas.getContext('2d');
  const campoNota = document.getElementById('campo-nota');

  let zoom = 1.0;
  let modo = 'check';
  let desenhando = false;

  mapaImg.onload = () => {
    canvas.width = mapaImg.width;
    canvas.height = mapaImg.height;
    carregarDesenho();
  };
  if (mapaImg.complete) mapaImg.onload();

  // CONTROLES DE ZOOM
  document.getElementById('btn-zoom-in').onclick = () => { zoom += 0.2; aplicarZoom(); };
  document.getElementById('btn-zoom-out').onclick = () => { if(zoom > 0.4) zoom -= 0.2; aplicarZoom(); };
  function aplicarZoom() { container.style.transform = `scale(${zoom})`; }

  // ALTERNAR MODOS
  document.getElementById('btn-check').onclick = () => { modo = 'check'; atualizarBotoes('btn-check'); };
  document.getElementById('btn-draw').onclick = () => { modo = 'draw'; atualizarBotoes('btn-draw'); };
  function atualizarBotoes(id) {
    document.getElementById('btn-check').classList.remove('active');
    document.getElementById('btn-draw').classList.remove('active');
    document.getElementById(id).classList.add('active');
  }

  // AÇÃO DE CLIQUE / DESENHO
  canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / zoom;
    const y = (e.clientY - rect.top) / zoom;

    if (modo === 'check') {
      const nota = campoNota.value;
      db.ref('pontos').push({ x, y, nota: nota });
      campoNota.value = ""; // Limpa após usar
    } else {
      desenhando = true;
      ctx.beginPath();
      ctx.moveTo(x, y);
    }
  };

  canvas.onmousemove = (e) => {
    if (!desenhando || modo !== 'draw') return;
    const rect = canvas.getBoundingClientRect();
    ctx.lineTo((e.clientX - rect.left) / zoom, (e.clientY - rect.top) / zoom);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3 / zoom;
    ctx.stroke();
  };

  window.onmouseup = () => {
    if (desenhando) {
      desenhando = false;
      db.ref('desenho').set(canvas.toDataURL());
    }
  };

  // LIMPAR TUDO
  document.getElementById('btn-clear').onclick = () => {
    if(confirm("Deseja apagar todos os checks e desenhos?")) db.ref('/').remove();
  };

  // FIREBASE SINCRONIZAÇÃO
  db.ref('pontos').on('child_added', snap => {
    const p = snap.val();
    const div = document.createElement('div');
    div.className = 'ponto-wrapper';
    div.id = snap.key;
    div.style.left = p.x + 'px';
    div.style.top = p.y + 'px';
    div.innerHTML = `<div class="check-mark">✓</div>${p.nota ? `<div class="nota-label">${p.nota}</div>` : ''}`;
    div.onclick = (e) => { e.stopPropagation(); db.ref('pontos/' + snap.key).remove(); };
    container.appendChild(div);
  });

  db.ref('pontos').on('child_removed', snap => {
    const el = document.getElementById(snap.key);
    if(el) el.remove();
  });

  function carregarDesenho() {
    db.ref('desenho').on('value', snap => {
      const data = snap.val();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (data) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = data;
      }
    });
  }
</script>

</body>
</html>

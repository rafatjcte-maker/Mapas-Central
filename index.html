<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Mapa Colaborativo Final</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #eee; margin: 20px; }
    .toolbar { margin-bottom: 15px; padding: 10px; background: white; border-radius: 8px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    #mapa-container { 
      position: relative; 
      display: inline-block;
      line-height: 0; /* Remove espaços fantasmas abaixo da imagem */
      user-select: none; 
      -webkit-user-drag: none;
    }

    #mapa { 
      max-width: 100%; 
      height: auto; 
      display: block;
      pointer-events: none; /* A imagem é apenas fundo, não recebe cliques */
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
      touch-action: none; /* Importante para mobile: impede scroll ao desenhar */
    }

    .ponto {
      position: absolute;
      color: #28a745;
      font-size: 26px;
      font-weight: bold;
      transform: translate(-50%, -50%);
      text-shadow: 1px 1px 2px black;
      cursor: pointer;
      z-index: 10;
      line-height: 1;
    }
    
    button { padding: 10px 20px; cursor: pointer; margin: 0 5px; border: 1px solid #ccc; border-radius: 4px; }
    .active { background: #007bff; color: white; border-color: #0056b3; }
  </style>
</head>
<body>

<div class="toolbar">
  <button id="btn-check" class="active">Check (✓)</button>
  <button id="btn-draw">Desenhar Linhas</button>
  <button id="btn-clear" style="color: red;">Limpar Tudo</button>
</div>

<div id="mapa-container">
  <img id="mapa" src="sua_imagem.jpeg" alt="Mapa">
  <canvas id="canvas-camada"></canvas>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyASJAChidjwTNrZznygxsjTtOVX5YTi6Vc",
    authDomain: "mapas-central-62849.firebaseapp.com",
    databaseURL: "https://mapas-central-62849-default-rtdb.firebaseio.com",
    projectId: "mapas-central-62849",
    storageBucket: "mapas-central-62849.firebasestorage.app",
    messagingSenderId: "404730642965",
    appId: "1:404730642965:web:7b89ed72c60aac32d9c41c"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const container = document.getElementById('mapa-container');
  const mapaImg = document.getElementById('mapa');
  const canvas = document.getElementById('canvas-camada');
  const ctx = canvas.getContext('2d');
  
  let modo = 'check';
  let desenhando = false;
  let pontosDOM = {};

  // Ajusta o canvas ao tamanho real da imagem
  function ajustarCanvas() {
    canvas.width = mapaImg.clientWidth;
    canvas.height = mapaImg.clientHeight;
    renderizarDesenho();
  }

  mapaImg.onload = ajustarCanvas;
  window.onresize = ajustarCanvas;
  if (mapaImg.complete) ajustarCanvas();

  // Alternar modos
  document.getElementById('btn-check').onclick = () => { modo = 'check'; alternarBotao('btn-check'); };
  document.getElementById('btn-draw').onclick = () => { modo = 'draw'; alternarBotao('btn-draw'); };
  document.getElementById('btn-clear').onclick = () => { if(confirm("Apagar tudo?")) db.ref('/').remove(); };

  function alternarBotao(id) {
    document.getElementById('btn-check').classList.remove('active');
    document.getElementById('btn-draw').classList.remove('active');
    document.getElementById(id).classList.add('active');
  }

  // Eventos de Mouse/Toque
  canvas.addEventListener('mousedown', iniciar);
  canvas.addEventListener('mousemove', desenhar);
  canvas.addEventListener('mouseup', parar);
  canvas.addEventListener('touchstart', (e) => iniciar(e.touches[0]));
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); desenhar(e.touches[0]); });
  canvas.addEventListener('touchend', parar);

  function iniciar(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.pageX) - rect.left;
    const y = (e.clientY || e.pageY) - rect.top;

    if (modo === 'check') {
      db.ref('pontos').push({ x, y });
    } else {
      desenhando = true;
      ctx.beginPath();
      ctx.moveTo(x, y);
    }
  }

  function desenhar(e) {
    if (!desenhando || modo !== 'draw') return;
    const rect = canvas.getBoundingClientRect();
    ctx.lineTo((e.clientX || e.pageX) - rect.left, (e.clientY || e.pageY) - rect.top);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;
    ctx.lineJoin = "round";
    ctx.stroke();
  }

  function parar() {
    if (desenhando) {
      desenhando = false;
      db.ref('desenho').set(canvas.toDataURL());
    }
  }

  // Firebase: Sincronizar Pontos
  db.ref('pontos').on('child_added', snap => {
    const p = snap.val();
    const div = document.createElement('div');
    div.className = 'ponto';
    div.id = snap.key;
    div.innerHTML = '✓';
    div.style.left = p.x + 'px';
    div.style.top = p.y + 'px';
    div.onclick = () => db.ref('pontos/' + snap.key).remove();
    container.appendChild(div);
    pontosDOM[snap.key] = div;
  });

  db.ref('pontos').on('child_removed', snap => {
    pontosDOM[snap.key]?.remove();
    delete pontosDOM[snap.key];
  });

  // Firebase: Sincronizar Desenho
  function renderizarDesenho() {
    db.ref('desenho').on('value', snap => {
      const data = snap.val();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (data) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = data;
      }
    });
  }
</script>

</body>
</html>
